name: Lint & Type Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ruff:
    name: Ruff (linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: |
          ruff check . --output-format=github

  mypy:
    name: mypy (types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mypy
          pip install types-requests || true

      - name: Run mypy
        run: |
          mypy gui/ config/ engine/ media/ network/ utils/ models/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --follow-imports=silent \
            --show-error-codes \
            --pretty
        continue-on-error: true
